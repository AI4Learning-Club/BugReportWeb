        systemId:
          type: string
          description: 关联系统 ID
        title:
          type: string
          description: 功能标题
        description:
          type: string
          description: 功能描述与验收标准
        priority:
          $ref: "#/components/schemas/Severity"

    UpdateFeatureBody:
      type: object
      properties:
        systemId:
          type: string
        title:
          type: string
        description:
          type: string
        priority:
          $ref: "#/components/schemas/Severity"

    RoleBody:
      type: object
      properties:
