  /bugs/{id}/personnel:
    patch:
      tags: [Bugs, Personnel]
      summary: 委派 Bug 人员
      description: |
        无控制器级固定权限；按 body 字段**动态鉴权**（至少提供一个字段）：

        | 字段 | 所需权限 | 说明 |
        |------|---------|------|
        | `ownerId`（非 null） | `DELEGATE_ITEM_OWNER` | 委派他人为负责人 |
        | `ownerId: null` | `BECOME_ITEM_OWNER`（现任负责人自荐卸任）或 `DELEGATE_ITEM_OWNER` | 撤销负责人 |
        | `addRelatedUserIds` | `DELEGATE_ITEM_RELATED` | 添加相关人（须 ACTIVE 用户） |
        | `removeRelatedUserIds` | `DELEGATE_ITEM_RELATED` 或自行移除自己 | 退出相关人无需委派权限 |

        约束：`ownerId` 不能与 `addRelatedUserIds` 重叠；用户须为 ACTIVE。
      x-permissions: []
      x-service-rules:
        - 按 PersonnelPatchBody 字段动态校验权限
      operationId: bugsPersonnelPatch
      parameters:
        - $ref: "#/components/parameters/bugId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PersonnelPatchBody"
            examples:
              delegateOwner:
                summary: 委派负责人
                value:
                  ownerId: u-alice
              revokeOwner:
                summary: 撤销负责人
                value:
                  ownerId: null
              addRelated:
                summary: 添加相关人
                value:
                  addRelatedUserIds: [u-bob, u-carol]
              selfExit:
                summary: 自行退出相关人
                value:
                  removeRelatedUserIds: [当前用户ID]
      responses:
        "200":
          description: 更新后的 Bug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

