        bugsOwned:
          type: integer
        featuresOwned:
          type: integer
        openBugsOwned:
          type: integer
        openFeaturesOwned:
          type: integer
        workloadScore:
          type: number

    KpiOverview:
      type: object
      properties:
        generatedAt:
