openapi: 3.1.0
info:
  title: BugReportWeb API
  version: "1.0.0"
  summary: Bug 与功能需求跟踪、人员委派与团队 KPI 的 REST API
  description: |
    BugReportWeb 后端 REST API，用于 Bug 登记、复测、功能需求跟踪、人员委派与团队 KPI 统计。

    ## 基址与调用方式

    **请直连后端 origin**（开发默认 `http://localhost:3001`），不要以前端 Vite 开发服务器（如 `:5173`）作为 API 基址。
    生产环境若前后端同域部署，浏览器仍应使用同一 origin 下的 `/bugs`、`/auth/login` 等路径。

    请求头建议：
    - `Content-Type: application/json`（JSON 接口）
    - `Authorization: Bearer <JWT>`（除公开端点外均需要）

    ## 快速开始

    1. `POST /auth/register` 注册账号（状态为 `PENDING`）
    2. 管理员 `PATCH /users/{id}/approve` 审批并分配角色
    3. `POST /auth/login` 获取 `accessToken`（有效期 7 天）
    4. `GET /auth/me` 预检当前用户权限
    5. 按业务调用 Bug / 功能 / 系统等接口

    ```bash
    # 登录示例
    curl -X POST http://localhost:3001/auth/login \
      -H "Content-Type: application/json" \
      -d '{"username":"demo","password":"secret123"}'

    # 携带 token 创建 Bug
    curl -X POST http://localhost:3001/bugs \
      -H "Authorization: Bearer <token>" \
      -H "Content-Type: application/json" \
      -d '{"systemId":"...","title":"按钮无响应","description":"点击保存无反应","severity":"HIGH"}'
    ```

    ## 认证与账号状态

    | 用户状态 | 含义 | 能否登录 |
    |---------|------|---------|
    | `PENDING` | 已注册待审批 | 否 |
    | `ACTIVE` | 正常使用 | 是 |
    | `DISABLED` | 已禁用 | 否 |

    - JWT payload 含 `sub`（用户 ID）与 `username`
    - `isAdmin: true` 的用户**绕过所有权限检查**，但仍需有效 JWT
    - 登录失败统一返回 `401`，消息为 `Invalid credentials` 或 `User is pending approval or disabled`

    ## 权限模型

    - 控制器 `@Permissions(A, B)` 表示 **OR**：拥有 A **或** B 任一权限即可
    - 各 operation 的 `x-permissions` 列出装饰器要求的权限；`[]` 表示仅需有效 JWT
    - `x-service-rules` 描述服务层额外规则（创建者限制、admin 专属等）
    - 人员 PATCH（`/bugs|features/{id}/personnel`）按 body 字段**动态鉴权**，见对应端点说明
    - 完整权限目录：`GET /roles/permissions`（需 `MANAGE_ROLES` 或 `MANAGE_USERS`）

    ### 权限速查

    | 权限 | 中文名 | 主要 API |
    |------|--------|---------|
    | `CREATE_BUG` | 创建 Bug | `POST /bugs` |
    | `RETEST_BUG` | 复测 Bug | `POST /bugs/{id}/retests` |
    | `MARK_BUG_FIXED` | 标记修复 | `PATCH /bugs/{id}/status`、`POST .../personnel/join` |
    | `ADD_BUG_EVIDENCE` | 补充证据 | 截图 / 运行信息相关 |
    | `DELETE_BUG` | 软删除 Bug | `POST /bugs/{id}/delete` |
    | `CREATE_FEATURE` | 登记功能 | `POST /features` |
    | `UPDATE_FEATURE` | 更新功能 | `PATCH /features/{id}`、`/status`、`/personnel/join` |
    | `BECOME_ITEM_OWNER` | 成为负责人 | `POST .../personnel/claim-owner` |
    | `DELEGATE_ITEM_OWNER` | 委派负责人 | `PATCH .../personnel`（`ownerId`） |
    | `DELEGATE_ITEM_RELATED` | 委派相关人 | `PATCH .../personnel`（`add/removeRelatedUserIds`） |
    | `VIEW_STATS` | 查看 KPI | `GET /stats/kpi` |
    | `MANAGE_SYSTEMS` | 系统管理 | `/systems` 写操作 |
    | `MANAGE_ROLES` | 角色管理 | `/roles` 写操作与导入导出 |
    | `MANAGE_USERS` | 用户管理 | `/users` |

    ## 错误响应

    统一 JSON 格式（NestJS 默认）：

    ```json
    {
      "statusCode": 403,
      "message": "Only admins or creators can edit bugs",
      "error": "Forbidden"
    }
    ```

    | HTTP | 典型场景 |
    |------|---------|
    | `400` | 必填字段缺失、枚举无效、业务校验失败 |
    | `401` | 未携带 token、token 过期、账号未激活 |
    | `403` | 权限不足、非创建者/非 admin 操作 |
    | `404` | 资源 ID 不存在 |
    | `409` | 用户名冲突（注册） |

    `message` 可能为字符串或字符串数组（校验类错误）。

    ## 列表筛选与软删除

    Bug / 功能列表支持查询参数：

    - `systemId`：按被跟踪系统过滤
    - `status`：按状态过滤（Bug: `OPEN`/`FIXED`；功能: `PLANNED`/`IN_PROGRESS`/`DONE`）
    - `deleted`：`active`（默认，仅未删除）、`only`（仅回收站）、`all`（全部；非 admin 会被拒绝或过滤）
    - `participantUserId`：筛选指定用户参与过的记录（创建者、负责人、相关人、修复人等）

    软删除记录设置 `deletedAt`；仅 admin 可查看 `deleted=only` 的详情。永久删除需先软删除。

    ## 状态流转

    **Bug**：`OPEN` ↔ `FIXED`（`PATCH /bugs/{id}/status`，需 `MARK_BUG_FIXED`；变更为 `FIXED` 时 `note` 必填）

    **功能**：`PLANNED` → `IN_PROGRESS` → `DONE`（无强制顺序，但服务层拒绝重复设置相同状态）

    ## 活动记录

    所有写入操作在事务内产生活动记录（`activities` 数组，仅详情接口返回完整列表）。
    人员类活动 `context` 含 `previousOwnerName`、`newOwnerName`、`userNames` 等展示字段。

    | 类型 | 含义 |
    |------|------|
    | `CREATED` / `UPDATED` / `STATUS_CHANGED` / `DELETED` | 基础生命周期 |
    | `SCREENSHOT_*` / `RUNTIME_INFO_*` | 证据变更 |
    | `RETEST_RECORDED` | 复测提交 |
    | `OWNER_CLAIMED` / `OWNER_DELEGATED` / `OWNER_REVOKED` | 负责人 |
    | `RELATED_JOINED` / `RELATED_ADDED` / `RELATED_REMOVED` | 相关人 |

    业务撤销应使用对称操作（如 `ownerId: null`、自行退出相关人），**不要**用 `DELETE .../activities` 掩盖历史。

    ## 静态资源

    截图等上传文件通过静态目录提供：`GET /uploads/bug-screenshots/{filename}`。
    响应中 `Screenshot.path` 为相对路径，完整 URL = `{API_BASE}{path}`。

    上传限制：仅 `image/*`，单文件最大 50MB。

servers:
  - url: http://localhost:3001
    description: 本地开发（直连后端，默认端口 3001）
  - url: "{scheme}://{host}"
    description: 生产 / 自定义部署（前后端同域时与浏览器 origin 一致）
    variables:
      scheme:
        default: https
        enum: [http, https]
      host:
        default: your-api-host.example.com

tags:
  - name: Auth
    description: |
      认证与会话。`register` / `login` 为公开端点；其余需 JWT。
      新注册用户处于 `PENDING`，须管理员审批后方可登录。
  - name: Bugs
    description: |
      Bug 全生命周期：登记、编辑、状态、证据（截图/运行信息）、复测、人员委派、软删除与活动审计。
      列表返回摘要计数；详情含完整 `activities`。
  - name: Features
    description: |
      功能需求管理：登记、编辑、状态推进、人员委派、软删除与活动审计。
      权限与 Bug 类似但使用 `UPDATE_FEATURE` 替代 `MARK_BUG_FIXED`。
  - name: Personnel
    description: |
      人员委派子域：负责人认领/卸任（`claim-owner`、`ownerId: null`）、相关人加入（`join`）、
      委派添加/移除（`PATCH .../personnel`）。Bug 与 Feature 共用 `PersonnelPatchBody` 与动态鉴权规则。
  - name: Attachments
    description: |
      Bug 证据附件。截图经 multipart 上传至 `uploads/bug-screenshots/`，通过 `GET /uploads/bug-screenshots/{filename}` 静态访问。
      运行信息为 JSON 文本字段，非文件附件。
  - name: Systems
    description: |
      被跟踪系统（产品/项目）维护。Bug 与功能均须关联有效系统。
      有关联 Bug 的系统不可删除。
  - name: Roles
    description: |
      角色与权限配置：CRUD、权限目录、JSON 导入导出。
      角色被用户引用时不可删除。
  - name: Users
    description: |
      用户管理（控制器级要求 `MANAGE_USERS`）。
      含审批、角色分配、管理员标记、启用/禁用。
  - name: Stats
    description: |
      团队 KPI 统计：成员处理量、负责项、平均修复时长、工作负载评分等。
      需 `VIEW_STATS` 权限。

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: 注册账号
      description: |
        公开端点，无需 JWT。

        - 新用户状态固定为 `PENDING`，`role` 预置为「普通用户」（若存在）
        - 密码最少 6 位
        - 用户名唯一；冲突返回 `409`
        - 注册成功后须等待管理员 `PATCH /users/{id}/approve` 审批
      security: []
      x-permissions: []
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
            examples:
              default:
                summary: 新用户注册
                value:
                  username: zhangsan
                  password: secret123
                  displayName: 张三
      responses:
        "201":
          description: 注册成功，等待审批
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
              examples:
                pending:
                  value:
                    user:
                      id: clx1abc000001
                      username: zhangsan
                      displayName: 张三
                      status: PENDING
                    message: 注册成功，等待管理员审批
        "400":
          description: 参数无效（缺字段或密码过短）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                missing:
                  value:
                    statusCode: 400
                    message: username, password and displayName are required
        "409":
          $ref: "#/components/responses/Conflict"

  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      description: |
        公开端点。校验用户名密码后签发 JWT（7 天有效）。

        失败场景（均 `401`）：
        - 用户名或密码错误 → `Invalid credentials`
        - 账号 `PENDING` 或 `DISABLED` → `User is pending approval or disabled`
      security: []
      x-permissions: []
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
            examples:
              default:
                value:
                  username: demo
                  password: secret123
      responses:
        "200":
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              examples:
                success:
                  value:
                    accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                    user:
                      id: clx1abc000002
                      username: demo
                      displayName: 演示用户
                      status: ACTIVE
                      isAdmin: false
                      role:
                        id: role-normal
                        name: 普通用户
                        permissions: [CREATE_BUG, RETEST_BUG]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      tags: [Auth]
      summary: 当前用户
      description: |
        获取当前 JWT 对应用户，含 `role.permissions` 与 `isAdmin`。

        **建议**：自动化客户端在批量写操作前先调用，缓存权限集合以避免无效请求。
        响应不含密码等敏感字段。
      x-permissions: []
      operationId: authMe
      responses:
        "200":
          description: 当前用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              examples:
                activeUser:
                  value:
                    id: clx1abc000002
                    username: demo
                    displayName: 演示用户
                    status: ACTIVE
                    isAdmin: false
                    role:
                      id: role-normal
                      name: 普通用户
                      permissions: [CREATE_BUG, RETEST_BUG, MARK_BUG_FIXED]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/assignable-users:
    get:
      tags: [Auth]
      summary: 可分配用户列表
      description: |
        返回所有 `ACTIVE` 用户（`id`、`username`、`displayName`），用于人员委派下拉与 PATCH body 中的用户 ID。

        不包含 `PENDING` / `DISABLED` 用户；委派时若指定无效用户 ID 将返回 `400`。
      x-permissions: []
      operationId: authAssignableUsers
      responses:
        "200":
          description: 可分配用户列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssignableUser"
              examples:
                list:
                  value:
                    - id: u1
                      username: alice
                      displayName: 爱丽丝
                    - id: u2
                      username: bob
                      displayName: 鲍勃
        "401":
          $ref: "#/components/responses/Unauthorized"

  /bugs:
    get:
      tags: [Bugs]
      summary: Bug 列表
      description: |
        返回 Bug 摘要列表（含截图/运行信息/复测计数，不含完整 `activities`）。

        筛选参数可组合使用。`participantUserId` 匹配创建者、负责人、相关人、修复人、
        删除人、活动参与者、复测人、证据作者等任一关系。

        非 admin 请求 `deleted=only` 返回 `403`；`deleted=all` 时非 admin 仅能看到自己有权访问的已删除项。
      x-permissions: []
      x-service-rules:
        - deleted=only|all 时非 admin 会被拒绝或过滤
      operationId: bugsList
      parameters:
        - $ref: "#/components/parameters/systemId"
        - $ref: "#/components/parameters/bugStatus"
        - $ref: "#/components/parameters/deleted"
        - $ref: "#/components/parameters/participantUserId"
      responses:
        "200":
          description: Bug 列表（按更新时间降序）
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BugItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Bugs]
      summary: 创建 Bug
      description: |
        创建新 Bug 并写入 `CREATED` 活动记录。创建者自动成为 `creator`。

        必填：`systemId`、`title`、`description`。`systemId` 须指向未删除的系统。
        可选附带 `runtimeInfos` 数组，在创建时一并添加运行信息（各条需 `title` + `logText`）。
      x-permissions: [CREATE_BUG]
      operationId: bugsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBugBody"
            examples:
              minimal:
                summary: 最小必填
                value:
                  systemId: sys-001
                  title: 保存按钮无响应
                  description: 在编辑页点击保存后页面卡住，控制台无报错
              full:
                summary: 含复现信息与运行日志
                value:
                  systemId: sys-001
                  title: 导出 Excel 乱码
                  description: 中文文件名导出后变为问号
                  severity: MEDIUM
                  environment: Windows 11 / Chrome 122
                  steps: "1. 打开列表\n2. 点击导出\n3. 打开下载文件"
                  expected: 文件名与内容编码正确
                  actual: 文件名为乱码
                  runtimeInfos:
                    - title: 浏览器控制台
                      environment: Chrome 122
                      logText: "Uncaught EncodingError: ..."
      responses:
        "201":
          description: 创建的 Bug 详情（含 activities）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /bugs/{id}:
    get:
      tags: [Bugs]
      summary: Bug 详情
      description: |
        返回完整 Bug，含 `activities`（按时间升序）、`screenshots`、`runtimeInfos`、`retests`、人员信息。

        已软删除的 Bug 仅 `isAdmin` 可查看，否则 `404`。
      x-permissions: []
      x-service-rules:
        - 已软删除的 Bug 仅 admin 可查看
      operationId: bugsDetail
      parameters:
        - $ref: "#/components/parameters/bugId"
      responses:
        "200":
          description: Bug 详情（含 activities）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Bugs]
      summary: 更新 Bug 字段
      description: |
        部分更新 Bug 内容字段（不含 `status`，状态请用 `PATCH /bugs/{id}/status`）。

        仅 **admin** 或 **创建者** 可编辑。变更写入 `UPDATED` 活动，`changes` 记录字段 diff。
        传入空字符串的 `title`/`description`/`systemId` 会被拒绝。
      x-permissions: []
      x-service-rules:
        - 仅 admin 或 Bug 创建者可编辑
      operationId: bugsUpdate
      parameters:
        - $ref: "#/components/parameters/bugId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBugBody"
            examples:
              severity:
                value:
                  severity: CRITICAL
                  environment: 生产环境
      responses:
        "200":
          description: 更新后的 Bug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /bugs/{id}/status:
    patch:
      tags: [Bugs]
      summary: 更新 Bug 状态
      description: |
        切换 Bug 状态 `OPEN` ↔ `FIXED`，写入 `STATUS_CHANGED` 活动。

        - 变更为 `FIXED` 时 **`note` 必填**（修复说明）
        - 设为与当前相同状态 → `400 Bug already has this status`
        - 标记为 `FIXED` 时记录 `fixedBy` / `fixedAt`
      x-permissions: [MARK_BUG_FIXED]
      operationId: bugsUpdateStatus
      parameters:
        - $ref: "#/components/parameters/bugId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBugStatusBody"
            examples:
              fixed:
                summary: 标记已修复
                value:
                  status: FIXED
                  note: 已在 v2.1.0 修复按钮事件绑定问题
              reopen:
                summary: 重新打开
                value:
                  status: OPEN
                  note: 回归测试仍复现
      responses:
        "200":
          description: 更新后的 Bug
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BugDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /bugs/{id}/delete:
    post:
      tags: [Bugs]
      summary: 软删除 Bug
      description: |
        软删除：设置 `deletedAt`、`deletedBy`，写入 `DELETED` 活动。记录进入回收站。

        - 非 admin 仅可删除**自己创建**的 Bug
        - `reason` 可选，存入 `deleteReason`
      x-permissions: [DELETE_BUG]
      x-service-rules:
        - 非 admin 仅可软删除自己创建的 Bug
      operationId: bugsSoftDelete
      parameters:
        - $ref: "#/components/parameters/bugId"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SoftDeleteBody"
            examples:
              withReason:
                value:
                  reason: 重复登记，合并至 #42
      responses:
        "200":
          description: 软删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /bugs/{id}/permanent:
    delete:
      tags: [Bugs]
