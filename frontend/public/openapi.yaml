          $ref: "#/components/responses/NotFound"

  /systems:
    get:
      tags: [Systems]
      summary: 系统列表
      description: |
        返回被跟踪系统列表。默认不含已软删除项；`includeDeleted=true` 时包含。
        创建 Bug/功能时须选择未删除的系统。
      x-permissions: []
      operationId: systemsList
      parameters:
        - $ref: "#/components/parameters/includeDeleted"
      responses:
        "200":
          description: 系统列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackedSystem"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Systems]
      summary: 创建系统
      description: |
        创建被跟踪系统。`name` 必填且全局唯一（冲突 `400 系统名称已存在`）。
      x-permissions: [MANAGE_SYSTEMS]
      operationId: systemsCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemBody"
            examples:
              default:
                value:
                  name: 订单中心
                  description: 电商订单与支付子系统
                  owner: 张三
                  versionInfo: v2.4.1
      responses:
        "201":
          description: 创建的系统
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedSystem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /systems/{id}:
    get:
      tags: [Systems]
      summary: 系统详情
      description: 按 ID 获取单个被跟踪系统。
      x-permissions: []
      operationId: systemsDetail
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: 系统详情
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedSystem"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Systems]
      summary: 更新系统
      description: |
        部分更新系统字段。`name` 若修改须保持唯一。
        传 `null` 可清空 `description` / `owner` / `versionInfo`。
      x-permissions: [MANAGE_SYSTEMS]
      operationId: systemsUpdate
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemUpdateBody"
      responses:
        "200":
          description: 更新后的系统
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrackedSystem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Systems]
      summary: 删除系统
      description: |
        软删除系统（设置 `deletedAt`）。若仍有关联 Bug → `400 Cannot delete a system that already has bugs`。
      x-permissions: [MANAGE_SYSTEMS]
      x-service-rules:
        - 有关联 Bug 时拒绝删除
      operationId: systemsDelete
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /roles:
    get:
      tags: [Roles]
      summary: 角色列表
      description: |
        返回所有角色及 `permissions`、`userCount`。需 `MANAGE_ROLES` **或** `MANAGE_USERS`。
        用户管理页审批时需读取角色列表。
      x-permissions: [MANAGE_ROLES, MANAGE_USERS]
      operationId: rolesList
      responses:
        "200":
          description: 角色列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Role"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Roles]
      summary: 创建角色
      description: |
        创建新角色。`name` 必填；`permissions` 须为有效枚举值，否则 `400`。
      x-permissions: [MANAGE_ROLES]
      operationId: rolesCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleBody"
            examples:
              tester:
                value:
                  name: 测试工程师
                  permissions: [CREATE_BUG, RETEST_BUG, MARK_BUG_FIXED]
      responses:
        "201":
          description: 创建的角色
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /roles/permissions:
    get:
      tags: [Roles]
      summary: 权限目录
      description: |
        返回所有 `Permission` 的完整元数据：`zhName`、`summary`、`description`、`surfaces`、`apis`。
        与角色管理 UI 展示一致，供管理员理解各权限含义。
      x-permissions: [MANAGE_ROLES, MANAGE_USERS]
      operationId: rolesPermissions
      responses:
        "200":
          description: 权限目录
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PermissionDefinition"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /roles/export:
    get:
      tags: [Roles]
      summary: 导出角色配置
      description: |
        导出当前所有角色的 `name` + `permissions` 为 JSON 文档（`version: 1`），用于备份或跨环境同步。
      x-permissions: [MANAGE_ROLES]
      operationId: rolesExport
      responses:
        "200":
          description: 角色配置 JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleConfigDocument"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /roles/import:
    post:
      tags: [Roles]
      summary: 导入角色配置
      description: |
        **全量替换**角色权限配置（按角色名匹配更新 permissions，可创建新角色）。
        - `version` 须为 `1`
        - `roles` 非空数组，角色名不可重复
        - 无效权限枚举 → `400`
      x-permissions: [MANAGE_ROLES]
      operationId: rolesImport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleConfigDocument"
            examples:
              backup:
                value:
                  version: 1
                  exportedAt: "2024-06-01T00:00:00.000Z"
                  roles:
                    - name: 普通用户
                      permissions: [CREATE_BUG, RETEST_BUG]
                    - name: 开发
                      permissions: [MARK_BUG_FIXED, BECOME_ITEM_OWNER]
      responses:
        "200":
          description: 导入后的配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleConfigDocument"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /roles/{id}:
    patch:
      tags: [Roles]
      summary: 更新角色
      description: 更新角色名称或权限列表。`name` 不可为空。
      x-permissions: [MANAGE_ROLES]
      operationId: rolesUpdate
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleBody"
      responses:
        "200":
          description: 更新后的角色
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Role"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Roles]
      summary: 删除角色
      description: |
        删除角色。仍有用户引用时 → `400 Cannot delete a role assigned to users`。
      x-permissions: [MANAGE_ROLES]
      operationId: rolesDelete
      parameters:
        - $ref: "#/components/parameters/id"
      responses:
        "200":
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users:
    get:
      tags: [Users]
      summary: 用户列表
      description: |
        返回全部用户（含 `PENDING` / `DISABLED`），含 `role` 与 `isAdmin`。
        整个 `/users` 控制器要求 `MANAGE_USERS`（admin 豁免权限检查但仍需 JWT）。
      x-permissions: [MANAGE_USERS]
      operationId: usersList
      responses:
        "200":
          description: 用户列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
              examples:
                mixed:
                  value:
                    - id: u-pending
                      username: newcomer
                      displayName: 新同事
                      status: PENDING
                      isAdmin: false
                      role:
                        id: role-normal
                        name: 普通用户
                        permissions: [CREATE_BUG]
                    - id: u-active
                      username: alice
                      displayName: 爱丽丝
                      status: ACTIVE
                      isAdmin: true
                      role: null
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{id}:
    patch:
      tags: [Users]
      summary: 更新用户显示名
      description: 修改用户 `displayName`，`displayName` 必填且不可为空。
      x-permissions: [MANAGE_USERS]
      operationId: usersUpdate
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserDisplayNameBody"
      responses:
        "200":
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/approve:
    patch:
      tags: [Users]
      summary: 审批用户
      description: |
        将 `PENDING` 用户设为 `ACTIVE` 并分配 `roleId`。
        若 `roleId` 无效 → `404 Role not found`。
      x-permissions: [MANAGE_USERS]
      operationId: usersApprove
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserApproveBody"
            examples:
              approve:
                value:
                  roleId: role-normal
      responses:
        "200":
          description: 审批后的用户（status=ACTIVE）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: 用户非 PENDING 状态等业务校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/role:
    patch:
      tags: [Users]
      summary: 分配角色
      description: |
        为 ACTIVE 用户分配角色。`roleId: null` 可移除角色（保留账号）。
      x-permissions: [MANAGE_USERS]
      operationId: usersUpdateRole
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRoleBody"
      responses:
        "200":
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/admin:
    patch:
      tags: [Users]
      summary: 切换管理员标记
      description: |
        设置 `isAdmin`。管理员**不能取消自己的** admin 标记（`400`）。
        `isAdmin` 用户绕过所有 Permission 检查。
      x-permissions: [MANAGE_USERS]
      x-service-rules:
        - 不能取消自己的 admin 标记
      operationId: usersUpdateAdmin
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserAdminBody"
      responses:
        "200":
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{id}/status:
    patch:
      tags: [Users]
      summary: 更新用户状态
      description: |
        切换 `ACTIVE` / `DISABLED` 等。`status` 必填。
        用户**不能禁用自己**（`400`）。禁用后该用户无法登录。
      x-permissions: [MANAGE_USERS]
      x-service-rules:
        - 不能禁用自己
      operationId: usersUpdateStatus
      parameters:
        - $ref: "#/components/parameters/id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserStatusBody"
            examples:
              disable:
                value:
                  status: DISABLED
      responses:
        "200":
          description: 更新后的用户
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /uploads/bug-screenshots/{filename}:
    get:
      tags: [Attachments]
      summary: 获取 Bug 截图文件
      description: |
        Express 静态资源端点，映射后端 `uploads/bug-screenshots/` 目录。**无需 JWT**。

        `filename` 为上传时服务端生成的 UUID 文件名（含扩展名），可从 `Screenshot.path` 提取末段。
        示例：`<img src="http://localhost:3001/uploads/bug-screenshots/a1b2c3.png" alt="截图" />`

        文件不存在时由 Express 返回 `404`（非 JSON 错误体）。
      security: []
      x-permissions: []
      operationId: attachmentsGetScreenshot
      parameters:
        - name: filename
          in: path
          required: true
          description: 服务端生成的文件名（UUID + 扩展名）
          schema:
            type: string
            example: a1b2c3d4-e5f6-7890-abcd-ef1234567890.png
      responses:
        "200":
          description: 图片二进制内容（Content-Type 由文件扩展名决定）
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
        "404":
          description: 文件不存在

  /stats/kpi:
    get:
      tags: [Stats]
      summary: KPI 概览
      description: |
        聚合团队效率指标，含全局 `totals` 与按人 `people` 数组。

        `workloadScore` 综合负责中的 Bug/功能数量与未完成项加权计算，用于负载对比。
        `avgFixHours` 为已修复 Bug 的平均修复耗时（小时），无数据时为 `null`。
      x-permissions: [VIEW_STATS]
      operationId: statsKpi
      responses:
        "200":
          description: KPI 数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiOverview"
              examples:
                overview:
                  value:
                    generatedAt: "2024-06-01T08:00:00.000Z"
                    totals:
                      activeUsers: 12
                      openBugs: 34
                      fixedBugs: 128
                      activeFeatures: 8
                      doneFeatures: 45
                    people:
                      - user:
                          id: u1
                          username: alice
                          displayName: 爱丽丝
                        bugsCreated: 15
                        bugsFixed: 22
                        avgFixHours: 18.5
                        featuresCreated: 3
                        featuresCompleted: 5
                        retestsSubmitted: 40
                        retestsAppeared: 8
                        bugsOwned: 4
                        featuresOwned: 2
                        openBugsOwned: 2
                        openFeaturesOwned: 1
                        workloadScore: 12.5
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 登录后获得的 accessToken，有效期 7 天。

  parameters:
    id:
      name: id
      in: path
      required: true
      description: 资源 UUID（通用路径参数）
      schema:
        type: string
        example: clx1abc000001
    bugId:
      name: id
      in: path
      required: true
      description: Bug ID（cuid）
      schema:
        type: string
        example: clxbug000001
    featureId:
      name: id
      in: path
      required: true
      description: 功能 ID（cuid）
      schema:
        type: string
        example: clxfeat000001
    activityId:
      name: activityId
      in: path
      required: true
      description: 活动记录 ID
      schema:
        type: string
    screenshotId:
      name: screenshotId
      in: path
      required: true
      description: 截图 ID
      schema:
        type: string
    runtimeInfoId:
      name: infoId
      in: path
      required: true
      description: 运行信息 ID
      schema:
        type: string
    systemId:
      name: systemId
      in: query
      description: 按被跟踪系统 ID 过滤列表
      schema:
        type: string
    bugStatus:
      name: status
      in: query
      description: 按 Bug 状态过滤
      schema:
        $ref: "#/components/schemas/BugStatus"
    featureStatus:
      name: status
      in: query
      description: 按功能状态过滤
      schema:
        $ref: "#/components/schemas/FeatureStatus"
    deleted:
      name: deleted
      in: query
      description: |
        软删除过滤：`active`（默认）、`only`（回收站，非 admin 403）、`all`（全部）
      schema:
        type: string
        enum: [active, only, all]
        default: active
    participantUserId:
      name: participantUserId
      in: query
      description: 筛选指定用户参与过的 Bug/功能（创建者、负责人、相关人等）
      schema:
        type: string
    includeDeleted:
      name: includeDeleted
      in: query
      description: 系统列表是否包含已软删除系统
      schema:
        type: boolean
        default: false

  responses:
    BadRequest:
      description: 请求参数无效或业务校验失败
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            validation:
              value:
                statusCode: 400
                message: systemId, title and description are required
                error: Bad Request
    Unauthorized:
      description: 未认证、token 无效、或账号未激活
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            invalidToken:
              value:
                statusCode: 401
                message: Unauthorized
    Forbidden:
      description: 权限不足或违反服务层访问规则
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            noPermission:
              value:
                statusCode: 403
                message: You do not have permission to delegate the owner
                error: Forbidden
    NotFound:
      description: 资源不存在或当前用户无权查看（如已软删除）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            missing:
              value:
                statusCode: 404
                message: Bug not found
                error: Not Found
    Conflict:
      description: 资源冲突（如用户名已存在）
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            duplicateUser:
              value:
                statusCode: 409
                message: Username already exists
                error: Conflict

  schemas:
    ErrorResponse:
      type: object
      description: NestJS 标准错误响应
      properties:
        statusCode:
          type: integer
          description: HTTP 状态码
        message:
          description: 错误说明，校验失败时可能为字符串数组
          oneOf:
            - type: string
            - type: array
              items:
                type: string
        error:
          type: string
          description: HTTP 状态短语（如 Bad Request、Forbidden）

    OkResponse:
      type: object
      description: 无 body 业务数据时的成功响应
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    SoftDeleteBody:
      type: object
      description: 软删除可选原因
      properties:
        reason:
          type: string
          description: 删除原因，展示于 deleteReason 字段

    UpdateBugStatusBody:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/BugStatus"
        note:
          type: string
          description: 状态变更说明；变更为 FIXED 时必填

    UpdateFeatureStatusBody:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/FeatureStatus"
        note:
          type: string
          description: 状态变更备注（可选）

    RetestBody:
      type: object
      required: [result]
      properties:
        result:
          $ref: "#/components/schemas/RetestResult"
        note:
          type: string
          description: 复测备注

    ActivityChange:
      type: object
      description: 活动记录中的字段变更条目（UPDATED 类型）
      properties:
        field:
          type: string
          description: 变更字段名（如 title、severity）
        from:
          type: string
          nullable: true
          description: 变更前的展示值
        to:
          type: string
          nullable: true
          description: 变更后的展示值

    UserDisplayNameBody:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          description: 新的显示名称

    UserApproveBody:
      type: object
      properties:
        roleId:
          type: string
          description: 审批时分配的角色 ID

    UserRoleBody:
      type: object
      properties:
        roleId:
          type: string
          nullable: true
          description: 角色 ID；null 表示移除角色

    UserAdminBody:
      type: object
      properties:
        isAdmin:
          type: boolean
          description: 是否为系统管理员

    UserStatusBody:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/UserStatus"

    Permission:
      type: string
      description: 系统权限枚举，在角色管理中配置
      enum:
        - CREATE_BUG
        - RETEST_BUG
        - MARK_BUG_FIXED
        - ADD_BUG_EVIDENCE
        - DELETE_BUG
        - DELETE_BUG_ACTIVITY
        - CREATE_FEATURE
        - UPDATE_FEATURE
        - DELETE_FEATURE
        - DELETE_FEATURE_ACTIVITY
        - VIEW_STATS
        - MANAGE_SYSTEMS
        - MANAGE_ROLES
        - MANAGE_USERS
        - BECOME_ITEM_OWNER
        - DELEGATE_ITEM_RELATED
        - DELEGATE_ITEM_OWNER

    UserStatus:
      type: string
      description: 用户账号状态
      enum: [PENDING, ACTIVE, DISABLED]

    BugStatus:
      type: string
      description: "Bug 状态：OPEN（待修复）、FIXED（已修复）"
      enum: [OPEN, FIXED]

    FeatureStatus:
      type: string
      description: "功能状态：PLANNED（计划中）、IN_PROGRESS（进行中）、DONE（已完成）"
      enum: [PLANNED, IN_PROGRESS, DONE]

    Severity:
      type: string
      description: 严重程度 / 优先级（Bug severity 与 Feature priority 共用）
      enum: [LOW, MEDIUM, HIGH, CRITICAL]

    RetestResult:
      type: string
      description: "APPEARED=仍复现，NOT_APPEARED=未复现"
      enum: [APPEARED, NOT_APPEARED]

    AssignableUser:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string

    Role:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/Permission"
        userCount:
          type: integer
        permissionCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    User:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
        status:
          $ref: "#/components/schemas/UserStatus"
        isAdmin:
          type: boolean
        role:
          oneOf:
            - $ref: "#/components/schemas/Role"
            - type: "null"

    LoginBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          description: 登录用户名
        password:
          type: string
          format: password
          description: 登录密码

    RegisterBody:
      type: object
      required: [username, password, displayName]
      properties:
        username:
          type: string
          description: 唯一用户名
        password:
          type: string
          format: password
          minLength: 6
          description: 密码，至少 6 位
        displayName:
          type: string
          description: 显示名称（中文名）

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    RegisterResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        message:
          type: string

    TrackedSystem:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        versionInfo:
          type: string
          nullable: true
        deletedAt:
          type: string
          format: date-time
          nullable: true

    SystemBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        owner:
          type: string
        versionInfo:
          type: string

    SystemUpdateBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        owner:
          type: string
          nullable: true
        versionInfo:
          type: string
          nullable: true

    PersonnelPatchBody:
      type: object
      description: 至少提供一个字段；动态鉴权规则见 PATCH /bugs|features/{id}/personnel
      properties:
        ownerId:
          type: string
          nullable: true
          description: 委派负责人用户 ID；传 null 撤销负责人
        addRelatedUserIds:
          type: array
          description: 要添加的相关人用户 ID 列表（须 ACTIVE，且不能含 owner）
          items:
            type: string
        removeRelatedUserIds:
          type: array
          description: 要移除的相关人 ID；传自己的 ID 可自助退出
          items:
            type: string

    Screenshot:
      type: object
      properties:
        id:
          type: string
        path:
          type: string
          description: 相对路径，完整 URL 为 `{API_BASE}{path}` 或 `{API_BASE}/uploads/...`
        originalName:
          type: string
        caption:
          type: string
          nullable: true
        uploaderId:
          type: string

    RuntimeInfo:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        environment:
          type: string
          nullable: true
        logText:
          type: string
        authorId:
          type: string
        author:
          $ref: "#/components/schemas/AssignableUser"

    RuntimeInfoBody:
      type: object
      description: 创建时 title 与 logText 必填；更新时均为可选部分字段
      properties:
        title:
          type: string
          description: 运行信息标题（如「浏览器控制台」「服务端日志」）
        environment:
          type: string
          description: 环境标识（staging、prod 等）
        logText:
          type: string
          description: 日志或诊断文本内容

    Retest:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        result:
          $ref: "#/components/schemas/RetestResult"
        note:
          type: string
          nullable: true

    BugActivity:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - CREATED
            - UPDATED
            - STATUS_CHANGED
            - DELETED
            - SCREENSHOT_ADDED
            - SCREENSHOT_REMOVED
            - RUNTIME_INFO_ADDED
            - RUNTIME_INFO_UPDATED
            - RUNTIME_INFO_REMOVED
            - RETEST_RECORDED
            - OWNER_CLAIMED
            - OWNER_DELEGATED
            - OWNER_REVOKED
            - RELATED_JOINED
            - RELATED_ADDED
            - RELATED_REMOVED
        note:
          type: string
          nullable: true
        fromStatus:
          $ref: "#/components/schemas/BugStatus"
        toStatus:
          $ref: "#/components/schemas/BugStatus"
        changes:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ActivityChange"
        context:
          type: object
          additionalProperties: true
          description: 结构化上下文（人员类含 previousOwnerName、userNames 等）
        createdAt:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/AssignableUser"

    FeatureActivity:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - CREATED
            - UPDATED
            - STATUS_CHANGED
            - DELETED
            - OWNER_CLAIMED
            - OWNER_DELEGATED
            - OWNER_REVOKED
            - RELATED_JOINED
            - RELATED_ADDED
            - RELATED_REMOVED
        note:
          type: string
          nullable: true
        fromStatus:
          $ref: "#/components/schemas/FeatureStatus"
        toStatus:
          $ref: "#/components/schemas/FeatureStatus"
        changes:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/ActivityChange"
        context:
          type: object
          additionalProperties: true
          description: 结构化上下文（人员类含 previousOwnerName、userNames 等）
        createdAt:
          type: string
          format: date-time
        actor:
          $ref: "#/components/schemas/AssignableUser"

    BugItem:
      type: object
      description: Bug 列表项或详情主体（详情另含 activities）
      properties:
        id:
          type: string
          description: Bug 唯一 ID（cuid）
        title:
          type: string
          description: Bug 标题
        description:
          type: string
          description: 问题描述
        severity:
          $ref: "#/components/schemas/Severity"
        status:
          $ref: "#/components/schemas/BugStatus"
        environment:
          type: string
          nullable: true
        steps:
          type: string
          nullable: true
        expected:
          type: string
          nullable: true
        actual:
          type: string
          nullable: true
        system:
          $ref: "#/components/schemas/TrackedSystem"
        creator:
          $ref: "#/components/schemas/AssignableUser"
        owner:
          oneOf:
            - $ref: "#/components/schemas/AssignableUser"
            - type: "null"
        relatedUsers:
          type: array
          items:
            $ref: "#/components/schemas/AssignableUser"
        fixedBy:
          oneOf:
            - $ref: "#/components/schemas/AssignableUser"
            - type: "null"
        fixedAt:
          type: string
          format: date-time
          nullable: true
        deletedBy:
          oneOf:
            - $ref: "#/components/schemas/AssignableUser"
            - type: "null"
        deletedAt:
          type: string
          format: date-time
          nullable: true
        deleteReason:
          type: string
          nullable: true
        screenshots:
          type: array
          items:
            $ref: "#/components/schemas/Screenshot"
        runtimeInfos:
          type: array
          items:
            $ref: "#/components/schemas/RuntimeInfo"
        retests:
          type: array
          items:
            $ref: "#/components/schemas/Retest"
        screenshotCount:
          type: integer
        runtimeInfoCount:
          type: integer
        appearedCount:
          type: integer
        notAppearedCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BugDetail:
      allOf:
        - $ref: "#/components/schemas/BugItem"
        - type: object
          properties:
            activities:
              type: array
              items:
                $ref: "#/components/schemas/BugActivity"

    FeatureItem:
      type: object
      description: 功能列表项或详情主体（详情另含 activities）
      properties:
        id:
          type: string
          description: 功能唯一 ID（cuid）
        title:
          type: string
          description: 功能标题
        description:
          type: string
          description: 功能描述与验收标准
        status:
          $ref: "#/components/schemas/FeatureStatus"
        priority:
          $ref: "#/components/schemas/Severity"
        system:
          $ref: "#/components/schemas/TrackedSystem"
        creator:
          $ref: "#/components/schemas/AssignableUser"
        owner:
          oneOf:
            - $ref: "#/components/schemas/AssignableUser"
            - type: "null"
        relatedUsers:
          type: array
          items:
            $ref: "#/components/schemas/AssignableUser"
        completedBy:
          oneOf:
            - $ref: "#/components/schemas/AssignableUser"
            - type: "null"
        completedAt:
          type: string
          format: date-time
          nullable: true
        deletedBy:
          oneOf:
            - $ref: "#/components/schemas/AssignableUser"
            - type: "null"
        deletedAt:
          type: string
          format: date-time
          nullable: true
        deleteReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FeatureDetail:
      allOf:
        - $ref: "#/components/schemas/FeatureItem"
        - type: object
          properties:
            activities:
              type: array
              items:
                $ref: "#/components/schemas/FeatureActivity"

    CreateBugBody:
      type: object
      required: [systemId, title, description]
      properties:
        systemId:
          type: string
          description: 关联的被跟踪系统 ID（须未删除）
        title:
          type: string
          description: Bug 标题
        description:
          type: string
          description: 问题描述
        severity:
          $ref: "#/components/schemas/Severity"
        environment:
          type: string
          description: 运行环境（OS、浏览器等）
        steps:
          type: string
          description: 复现步骤
        expected:
          type: string
          description: 期望结果
        actual:
          type: string
          description: 实际结果
        runtimeInfos:
          type: array
          description: 创建时一并添加的运行信息（各条需 title + logText）
          items:
            $ref: "#/components/schemas/RuntimeInfoBody"

    UpdateBugBody:
      type: object
      properties:
        systemId:
          type: string
        title:
          type: string
        description:
          type: string
        severity:
          $ref: "#/components/schemas/Severity"
        environment:
          type: string
        steps:
          type: string
        expected:
          type: string
        actual:
          type: string

    CreateFeatureBody:
      type: object
      required: [systemId, title, description]
